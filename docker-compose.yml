services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: workflowui
      POSTGRES_USER: workflowui
      POSTGRES_PASSWORD: workflowui
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./storage/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workflowui -d workflowui"]
      interval: 5s
      timeout: 5s
      retries: 10

  loki:
    image: grafana/loki:3.6.7
    ports:
      - "3100:3100"
    volumes:
      - ./storage/loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    # Loki 3.x uses a distroless image (no shell), so health checks must use
    # the binary directly. The loki binary has no built-in health sub-command,
    # so we skip a container healthcheck and rely on restart policy instead.
    restart: unless-stopped

  grafana:
    image: grafana/grafana:12.3
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_AUTH_DISABLE_LOGIN_FORM: "true"
    volumes:
      - ./storage/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
      - grafana_data:/var/lib/grafana
    restart: unless-stopped

volumes:
  postgres_data:
  loki_data:
  grafana_data:
