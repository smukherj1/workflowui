services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: workflowui
      POSTGRES_USER: workflowui
      POSTGRES_PASSWORD: workflowui
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./storage/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U workflowui -d workflowui"]
      interval: 5s
      timeout: 5s
      retries: 10
  api:
    build: ./ui/server
    ports:
      - "3001:3001"
    environment:
      PORT: "3001"
      PGHOST: postgres
      PGPORT: "5432"
      PGDATABASE: workflowui
      PGUSER: workflowui
      PGPASSWORD: workflowui
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
  ui:
    build: ./ui
    ports:
      - "8080:8080"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
